<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>深圳游戏数据可视化</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            width: 50%;
            height: 50%;
            position: absolute;
            right: 0;
            top: 0;
        }
		
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div id="map"></div>
    
    <script>
        // 取地图数据
        $.get('深圳市.geojson').done(function(s) {
            // 注册地图
            echarts.registerMap('sz', s);
            
            // 初始化地图
            var mapChart = echarts.init(document.getElementById('map'));
            
            // 配置地图的option
            var optionMap = {
                title: {
                    text: '深圳游戏产业分布图',
                    left: 'center',
                    top: 20,
                    textStyle: { fontSize: 16 }
                },
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}<br/>游戏企业数量: {c} 家'
                },
                visualMap: {
                    min: 0,
                    max: 4000,
                    left: 'left',
                    top: 'bottom',
                    text: ['高', '低'],
                    calculable: true,
                    inRange: {
                        color: [
                            '#313695', '#4575b4', '#74add1', '#abd9e9',
                            '#e0f3f8', '#ffffbf', '#fee090', '#fdae61',
                            '#f46d43', '#d73027', '#a50026'
                        ]
                    }
                },
                series: [{
                    name: '深圳游戏产业分布图',
                    type: 'map',
                    map: 'sz',
                    roam: true,
                    zoom: 1.2,
                    label: {
                        show: true,
                        fontSize: 10,
                        color: '#333'
                    },
                    emphasis: {
                        label: { show: true, fontWeight: 'bold' },
                        itemStyle: { areaColor: '#ffd700' }
                    },
                    data: [
                        { name: '南山区', value: 3850 },
                        { name: '宝安区', value: 2100 },
                        { name: '福田区', value: 1850 },
                        { name: '龙岗区', value: 1250 },
                        { name: '罗湖区', value: 850 },
                        { name: '龙华区', value: 620 },
                        { name: '坪山区', value: 280 },
                        { name: '光明区', value: 195 },
                        { name: '盐田区', value: 95 }
                    ]
                }]
            };
            
            // 使配置生效
            mapChart.setOption(optionMap);
            
            // 添加窗口自适应
            window.addEventListener('resize', function() {
                mapChart.resize();
            });
            
        }).fail(function() {
            console.error('地图数据加载失败，请检查深圳市.json文件路径');
            alert('地图数据加载失败，请确保深圳市.json文件存在且路径正确');
        });
    </script>
</body>
</html>
